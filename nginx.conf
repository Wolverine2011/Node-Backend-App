worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # STEP 1: Configure Load Balancing (The group of servers)
    upstream my_node_servers {
        server 127.0.0.1:3001; # Backend Server 1
        server 127.0.0.1:3002; # Backend Server 2
        server 127.0.0.1:3003; # Backend Server 3 (Optional extra)
    }

    server {
        listen       80;
        server_name  localhost;

        # STEP 2: Configure Reverse Proxy
        location / {
            proxy_pass http://my_node_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Error handling
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}